name: Update football-data cache

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch football-data.org
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${FOOTBALL_DATA_TOKEN:-}" ]; then
            echo "Missing FOOTBALL_DATA_TOKEN repository secret" >&2
            exit 1
          fi

          curl --fail --silent --show-error \
            -H "X-Auth-Token: ${FOOTBALL_DATA_TOKEN}" \
            "https://api.football-data.org/v4/competitions/WC/matches" \
            -o /tmp/wc_matches.json

          curl --fail --silent --show-error \
            -H "X-Auth-Token: ${FOOTBALL_DATA_TOKEN}" \
            "https://api.football-data.org/v4/competitions/WC/standings" \
            -o /tmp/wc_standings.json

          node <<'NODE'
          const fs = require("fs");
          const matches = JSON.parse(fs.readFileSync("/tmp/wc_matches.json", "utf8"));
          const standings = JSON.parse(fs.readFileSync("/tmp/wc_standings.json", "utf8"));
          const payload = {
            updatedAt: new Date().toISOString(),
            matches: matches.matches || [],
            standings: standings.standings || []
          };
          fs.writeFileSync("football_data_cache.json", JSON.stringify(payload, null, 2) + "\n");
          NODE

      - name: Commit cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add football_data_cache.json
          if git diff --cached --quiet; then
            echo "No football-data cache changes."
          else
            git commit -m "Update football-data cache"
            git push
          fi
